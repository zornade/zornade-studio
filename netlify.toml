# Netlify configuration for Zornade Studio.
#
# Build: Vite outputs to dist/. Functions live in netlify/functions and use the
# v2 signature with explicit `config.path` (/api/login, /api/session, /api/logout).
#
# Server-side secrets (set in Netlify UI → Site settings → Environment variables,
# NOT in this file and NOT in git):
#   STUDIO_USER            the username
#   STUDIO_PASS_SHA256     hex SHA-256 of the password
#   STUDIO_SESSION_SECRET  long random string for signing session cookies
#   SPACES_KEY             DigitalOcean Spaces access key (publish)
#   SPACES_SECRET          DigitalOcean Spaces secret key (publish)
#   SPACES_BUCKET          "zornade-studio-embed"
#   SPACES_REGION          "fra1"
# Optional: EMBED_BASE_URL (default https://studio.zornade.com),
#           EMBED_GEO_BASE (default https://studio.zornade.com/geo)

[build]
  command = "npm run build"
  publish = "dist"
  functions = "netlify/functions"

# Published embeds live on DigitalOcean Spaces (bucket "zornade-studio-embed",
# region fra1) but are served behind the Zornade domain via this proxy, so an
# already-published embed keeps working even if storage later moves (e.g. to
# self-hosted Garage). The reader sees studio.zornade.com/embed/… with Netlify's
# TLS; the bytes come from the Spaces CDN. Must precede the SPA fallback.
[[redirects]]
  from = "/embed/*"
  to = "https://zornade-studio-embed.fra1.cdn.digitaloceanspaces.com/embed/:splat"
  status = 200
  force = true

# Umami analytics proxy (self-hosted, EU). Same-origin paths so the strict CSP
# below (script-src/connect-src 'self') covers both the tracker script and the
# event beacon without any extra allowlisting - the browser never talks to
# analytics.zornade.com directly, Netlify proxies it server-side. `/js/pa.js`
# keeps this filename (not "umami"/"analytics") to reduce ad-blocker hits,
# matching the convention already used on zornade.com and app.zornade.com.
[[redirects]]
  from = "/js/pa.js"
  to = "https://analytics.zornade.com/script.js"
  status = 200

[[redirects]]
  from = "/js/api/send"
  to = "https://analytics.zornade.com/api/send"
  status = 200

[[redirects]]
  from = "/api/send"
  to = "https://analytics.zornade.com/api/send"
  status = 200

# SPA fallback: serve index.html for client routes (but not /api/* which the
# functions handle via their own config.path).
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200

# Security headers for the editor SPA (Studio.app). NOTE: per Netlify docs,
# custom headers are NOT applied to proxied content (the /embed/* redirect
# above proxies to DigitalOcean Spaces) - so this does not affect published
# embeds, which must stay iframe-able by newsroom sites regardless of this
# policy. Origins listed in connect-src are every domain fetched directly from
# the browser (verified against src/lib/*.ts, 2026-07-06): Supabase auth,
# OpenFreeMap basemap tiles, Protomaps font/sprite assets, Nominatim geocoding,
# the 3 public Overpass mirrors, and the AWS open terrain-tiles bucket. CKAN/
# Eurostat/generic-URL fetches all go through same-origin /api/* functions
# (server-side proxy), so their upstream domains do NOT need to be listed here.
# NB: if VITE_TILES_URL is ever set to an external self-hosted PMTiles domain
# (see .env.example), add that domain to connect-src too (default is same-
# origin /italia.pmtiles, already covered by 'self').
[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "DENY"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"
    Permissions-Policy = "camera=(), microphone=(), geolocation=()"
    Content-Security-Policy = "default-src 'self'; script-src 'self' blob: 'wasm-unsafe-eval'; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; img-src 'self' data: blob: https://protomaps.github.io; font-src 'self' https://fonts.gstatic.com; connect-src 'self' https://*.supabase.co https://tiles.openfreemap.org https://protomaps.github.io https://nominatim.openstreetmap.org https://maps.mail.ru https://overpass-api.de https://overpass.private.coffee https://elevation-tiles-prod.s3.amazonaws.com; worker-src 'self' blob:; frame-ancestors 'self'; base-uri 'self'; form-action 'self'"
